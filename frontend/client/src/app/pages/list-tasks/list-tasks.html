<div class="container mt-4">
<!--Title and create task button-->
<div class="d-flex justify-content-between align-items-center mb-3">
		<h3 class="mb-0">Tasks</h3>
		<a routerLink="/create-task" class="btn btn-dark">Create</a>
</div>

<div class=" row justify-content-center">
    <div class ="col-10">
        <!--Filter by status-->
        <select class="form-select w-25 mb-3" [(ngModel)]="selectedStatus">
        <option value="ALL">All</option>
        <option value="TO_DO">TO_DO </option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
        </select>
        <!--Table-->
        <table class="table table-striped table-bordered text-center align-middle">
            <thead>
                <tr>
                    <th>Task ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
               <!--Filter and dispay tasks based the status-->
               @for(task of taskList.filter(t => selectedStatus === 'ALL' || t.status === selectedStatus); track task.id)
                {
                <tr>
                    <td>{{task.id}}</td>
                    <td>{{task.title}}</td>
                    <td>{{task.description}}</td>
                    <td>{{task.status}}</td>
                    <td>{{task.createdAt}}</td>
                    <!--Delete and edit buttons-->
                    <td>
                       <a [routerLink]="['/edit-task', task.id]"  class="btn btn-sm btn-primary me-2">Edit</a>
					   <button class="btn btn-sm btn-danger" (click)="deleteTask(task.id)">Delete</button>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
</div>
